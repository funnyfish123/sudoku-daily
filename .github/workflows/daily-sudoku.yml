name: Daily Sudoku PDF

on:
  schedule:
    # Run at 12:30 AM CST (06:30 UTC) every day.
    # Note: GitHub Actions cron is UTC and does not observe DST,
    # so during CDT this fires at 1:30 AM local.
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      attempt:
        description: "Retry attempt number (auto-set when re-triggered on missing puzzles)"
        required: false
        default: "1"

permissions:
  contents: write
  pages: write
  actions: write # needed to re-dispatch this workflow on missing puzzles

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright pillow fpdf2
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Generate sudoku PDF
        run: |
          mkdir -p output
          xvfb-run --auto-servernum python latimes_sudoku.py output

      - name: Check for missing puzzles
        id: check
        run: |
          DATE=$(date +%Y-%m-%d)
          missing=()
          for diff in easy medium expert impossible; do
            if [ ! -f "output/sudoku_${diff}_${DATE}.png" ]; then
              missing+=("$diff")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing puzzles: ${missing[*]}"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "missing_count=${#missing[@]}" >> "$GITHUB_OUTPUT"
          else
            echo "All four puzzles captured"
            echo "missing_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy PDFs to docs for GitHub Pages
        run: |
          mkdir -p docs
          DATE=$(date +%Y-%m-%d)
          cp output/sudoku_${DATE}.pdf docs/sudoku-today.pdf 2>/dev/null || cp output/sudoku_2*.pdf docs/sudoku-today.pdf
          cp output/sudoku_answers_${DATE}.pdf docs/answers-today.pdf 2>/dev/null || cp output/sudoku_answers_*.pdf docs/answers-today.pdf 2>/dev/null || true
          cp output/*.pdf docs/ 2>/dev/null || true

      - name: Update download page
        run: |
          DATE=$(date +"%B %d, %Y")
          cat > docs/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Daily Sudoku</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 600px;
                margin: 80px auto;
                padding: 0 20px;
                text-align: center;
                color: #333;
              }
              h1 { font-size: 2em; margin-bottom: 0.2em; }
              .date { color: #888; margin-bottom: 2em; }
              .btn {
                display: inline-block;
                padding: 16px 40px;
                border-radius: 8px;
                text-decoration: none;
                font-size: 1.1em;
                font-weight: 600;
                margin: 8px 0;
                transition: opacity 0.2s;
              }
              .btn:hover { opacity: 0.85; }
              .btn-puzzle {
                background: #2563eb;
                color: white;
              }
              .btn-answers {
                background: #e2e8f0;
                color: #475569;
              }
              .buttons { display: flex; flex-direction: column; align-items: center; gap: 4px; }
              .info { color: #999; font-size: 0.9em; margin-top: 2em; }
            </style>
          </head>
          <body>
            <h1>Daily Sudoku</h1>
          HTMLEOF
          echo "  <p class=\"date\">Updated: ${DATE}</p>" >> docs/index.html
          cat >> docs/index.html << 'HTMLEOF'
            <p>Easy + Medium + Expert + Impossible<br>from the LA Times, in one printable PDF.</p>
            <div class="buttons">
              <a href="sudoku-today.pdf" class="btn btn-puzzle">Download Puzzles</a>
              <a href="answers-today.pdf" class="btn btn-answers">View Answers</a>
            </div>
            <p class="info">Auto-generated daily at 12:30 AM CST</p>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push
        if: steps.check.outputs.missing_count == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update sudoku PDF for $(date +%Y-%m-%d)"
          git push

      - name: Re-trigger on missing puzzles
        if: steps.check.outputs.missing_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTEMPT: ${{ github.event.inputs.attempt || '1' }}
          MISSING: ${{ steps.check.outputs.missing }}
        run: |
          MAX_ATTEMPTS=3
          NEXT=$((ATTEMPT + 1))
          if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
            echo "Already at attempt $ATTEMPT (max $MAX_ATTEMPTS). Missing puzzles persisted: $MISSING"
            exit 1
          fi
          echo "Attempt $ATTEMPT failed to capture: $MISSING. Dispatching attempt $NEXT."
          gh workflow run daily-sudoku.yml --ref "${{ github.ref_name }}" -f attempt=$NEXT
