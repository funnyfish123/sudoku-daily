name: Daily Sudoku PDF

on:
  schedule:
    # Run at 4:17 AM ET (08:17 UTC) every day.
    # Off-peak minute + early hour to absorb GitHub Actions scheduler delay
    # (top-of-hour and UTC-noon slots are the most congested).
    - cron: "17 8 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright pillow fpdf2
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Generate sudoku PDF
        run: |
          mkdir -p output
          xvfb-run --auto-servernum python latimes_sudoku.py output

      - name: Copy PDFs to docs for GitHub Pages
        run: |
          mkdir -p docs
          DATE=$(date +%Y-%m-%d)
          cp output/sudoku_${DATE}.pdf docs/sudoku-today.pdf 2>/dev/null || cp output/sudoku_2*.pdf docs/sudoku-today.pdf
          cp output/sudoku_answers_${DATE}.pdf docs/answers-today.pdf 2>/dev/null || cp output/sudoku_answers_*.pdf docs/answers-today.pdf 2>/dev/null || true
          cp output/*.pdf docs/ 2>/dev/null || true

      - name: Update download page
        run: |
          DATE=$(date +"%B %d, %Y")
          cat > docs/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Daily Sudoku</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                max-width: 600px;
                margin: 80px auto;
                padding: 0 20px;
                text-align: center;
                color: #333;
              }
              h1 { font-size: 2em; margin-bottom: 0.2em; }
              .date { color: #888; margin-bottom: 2em; }
              .btn {
                display: inline-block;
                padding: 16px 40px;
                border-radius: 8px;
                text-decoration: none;
                font-size: 1.1em;
                font-weight: 600;
                margin: 8px 0;
                transition: opacity 0.2s;
              }
              .btn:hover { opacity: 0.85; }
              .btn-puzzle {
                background: #2563eb;
                color: white;
              }
              .btn-answers {
                background: #e2e8f0;
                color: #475569;
              }
              .buttons { display: flex; flex-direction: column; align-items: center; gap: 4px; }
              .info { color: #999; font-size: 0.9em; margin-top: 2em; }
            </style>
          </head>
          <body>
            <h1>Daily Sudoku</h1>
          HTMLEOF
          echo "  <p class=\"date\">Updated: ${DATE}</p>" >> docs/index.html
          cat >> docs/index.html << 'HTMLEOF'
            <p>Easy + Medium + Expert + Impossible<br>from the LA Times, in one printable PDF.</p>
            <div class="buttons">
              <a href="sudoku-today.pdf" class="btn btn-puzzle">Download Puzzles</a>
              <a href="answers-today.pdf" class="btn btn-answers">View Answers</a>
            </div>
            <p class="info">Auto-generated daily at 8:00 AM ET</p>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update sudoku PDF for $(date +%Y-%m-%d)"
          git push
